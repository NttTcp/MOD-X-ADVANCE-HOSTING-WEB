<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOD-X — Premium Hosting</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0a0b0f;
      --bg-card: rgba(16, 18, 28, 0.85);
      --accent-1: #22c55e;
      --accent-2: #ef4444;
      --accent-3: #16a34a;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --glass-border: rgba(255,255,255,0.06);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ---- Animated background ---- */
    .bg-mesh {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(34, 197, 94, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(239, 68, 68, 0.10) 0%, transparent 50%),
        radial-gradient(ellipse at 40% 80%, rgba(22, 163, 74, 0.08) 0%, transparent 50%);
    }

    .grid-overlay {
      position: fixed; inset: 0; z-index: 1;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
    }

    .orb {
      position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.3; z-index: 0;
      animation: orbFloat 12s ease-in-out infinite alternate;
    }
    .orb-1 { width: 400px; height: 400px; background: var(--accent-1); top: -10%; left: -10%; }
    .orb-2 { width: 300px; height: 300px; background: var(--accent-2); bottom: -10%; right: -10%; animation-delay: -4s; }
    .orb-3 { width: 200px; height: 200px; background: var(--accent-3); top: 50%; left: 50%; animation-delay: -8s; }

    @keyframes orbFloat {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, 60px) scale(1.15); }
    }

    /* ---- Login card ---- */
    .login-wrapper {
      position: relative; z-index: 10;
      width: 100%; max-width: 420px; padding: 20px;
    }

    .login-card {
      background: var(--bg-card);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 40px 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
      transition: box-shadow 0.3s;
    }

    .login-card:hover {
      box-shadow: 0 20px 80px rgba(0, 240, 255, 0.08), 0 20px 60px rgba(0,0,0,0.6);
    }

    /* ---- Logo / Brand ---- */
    .brand {
      text-align: center; margin-bottom: 32px;
    }
    .brand-icon {
      width: 72px; height: 72px; margin: 0 auto 16px;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; color: #fff;
      box-shadow: 0 8px 32px rgba(34, 197, 94, 0.25);
    }
    .brand h1 {
      font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .brand p {
      font-size: 13px; color: var(--text-muted); margin-top: 4px;
    }

    /* ---- Form ---- */
    .form-group { margin-bottom: 18px; }

    .form-group label {
      display: block; font-size: 12px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 6px;
    }

    .input-wrap {
      position: relative;
    }
    .input-wrap i {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 15px; pointer-events: none;
    }

    .input-wrap select,
    .input-wrap input {
      width: 100%; padding: 13px 14px 13px 42px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      color: var(--text); font-size: 14px; font-family: inherit;
      outline: none; transition: 0.25s;
    }
    .input-wrap select { padding-left: 14px; cursor: pointer; appearance: none; }
    .input-wrap select:focus,
    .input-wrap input:focus {
      border-color: var(--accent-1);
      box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.12);
      background: rgba(255,255,255,0.06);
    }
    .input-wrap input::placeholder { color: var(--text-muted); opacity: 0.6; }

    .btn-submit {
      width: 100%; padding: 14px; margin-top: 8px;
      border: none; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      color: #fff; font-size: 15px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: 0.3s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0, 240, 255, 0.30);
    }
    .btn-submit:active { transform: translateY(0); }

    .footer-text {
      text-align: center; margin-top: 24px; padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .footer-text a {
      color: var(--accent-1); text-decoration: none; font-weight: 600;
      font-size: 13px; transition: 0.2s;
    }
    .footer-text a:hover { text-shadow: 0 0 12px var(--accent-1); }
    .footer-text .credit {
      margin-top: 12px; font-size: 11px; color: var(--text-muted); opacity: 0.5;
    }

    /* ---- particle canvas overlay ---- */
    #particles-canvas {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
    }

    @media (max-width: 480px) {
      .login-card { padding: 28px 20px; }
    }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="grid-overlay"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <canvas id="particles-canvas"></canvas>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="brand">
        <div class="brand-icon"><img src="/static/favicon.png" alt="MOD-X" style="width:42px;height:42px;border-radius:12px;" /></div>
        <h1>MOD-X PANEL</h1>
        <p>Powered by <strong>MOD-X</strong></p>
      </div>

      <form method="post" action="/login">
        <div class="form-group">
          <label>Access Level</label>
          <div class="input-wrap">
            <select name="login_type">
              <option value="user">👤 User Access</option>
              <option value="admin">⚡ Admin Root</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Username</label>
          <div class="input-wrap">
            <i class="fa-solid fa-user"></i>
            <input type="text" name="username" placeholder="Enter nickname" required />
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <i class="fa-solid fa-lock"></i>
            <input type="password" name="password" placeholder="••••••••" required />
          </div>
        </div>

        <button type="submit" class="btn-submit">
          <i class="fa-solid fa-arrow-right-to-bracket"></i> Access System
        </button>
      </form>

      <div class="footer-text">
        <a href="https://t.me/nttmodX" target="_blank">
          <i class="fa-brands fa-telegram"></i> @nttmodX
        </a>
        <div class="credit">MOD-X Hosting &mdash; Powered by MOD-X Engine</div>
      </div>
    </div>
  </div>

  <script>
    (function(){
      const canvas = document.getElementById('particles-canvas');
      const ctx = canvas.getContext('2d');
      let w, h, particles = [];

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      class Particle {
        constructor() { this.reset(); }
        reset() {
          this.x = Math.random() * w;
          this.y = Math.random() * h;
          this.vx = (Math.random() - 0.5) * 0.8;
          this.vy = (Math.random() - 0.5) * 0.8;
          this.r = Math.random() * 2.5 + 0.5;
          this.alpha = Math.random() * 0.5 + 0.2;
        }
        update() {
          this.x += this.vx;
          this.y += this.vy;
          if (this.x < 0 || this.x > w) this.vx *= -1;
          if (this.y < 0 || this.y > h) this.vy *= -1;
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(34, 197, 94, ${this.alpha})`;
          ctx.fill();
        }
      }

      for (let i = 0; i < 100; i++) particles.push(new Particle());

      let mouseX = -999, mouseY = -999;
      canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
      canvas.addEventListener('mouseleave', () => { mouseX = -999; mouseY = -999; });

      function animate() {
        ctx.clearRect(0, 0, w, h);
        for (const p of particles) {
          p.update();
          p.draw();
        }
        // Draw connections
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 140) {
              // Connect to mouse too
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(34, 197, 94, ${0.08 * (1 - dist / 140)})`;
              ctx.lineWidth = 0.6;
              ctx.stroke();
            }
          }
          // connect to mouse
          const dx = particles[i].x - mouseX;
          const dy = particles[i].y - mouseY;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 180) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(mouseX, mouseY);
            ctx.strokeStyle = `rgba(239, 68, 68, ${0.12 * (1 - dist / 180)})`;
            ctx.lineWidth = 1;
            ctx.stroke();
          }
        }
        requestAnimationFrame(animate);
      }
      animate();
    })();
  </script>
</body>
</html>
