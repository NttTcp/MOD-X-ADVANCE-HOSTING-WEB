# MOD-X Hosting — @nttmodX
# Render Blueprint

services:
  - type: web
    name: mod-x-hosting
    runtime: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile - --error-logfile -
    envVars:
      - key: FLASK_SECRET
        generateValue: true
      - key: ADMIN_PASS
        value: "8800"
      - key: DEBUG
        value: "false"
      - key: PORT
        value: "10000"
    healthCheckPath: /
    autoDeploy: true
